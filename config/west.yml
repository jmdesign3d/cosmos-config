manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
    - name: jmdesign3d
      url-base: https://github.com/jmdesign3d
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: cosmos-config
      remote: jmdesign3d
      revision: main
  self:
    path: config
